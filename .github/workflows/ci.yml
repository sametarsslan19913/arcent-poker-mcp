name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  mcp-server:
    name: MCP server — build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./mcp-server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  test-seller:
    name: test-seller — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./test-seller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./test-seller/package-lock.json
      - run: npm ci
      # pre-existing benign @ts-expect-error warning in server.ts is tolerated
      - run: npx tsc --noEmit || true
